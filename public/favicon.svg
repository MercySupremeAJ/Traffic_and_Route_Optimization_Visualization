<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2138"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Traffic Light Body -->
  <rect x="18" y="4" width="28" height="56" rx="8" fill="url(#body)" stroke="#2a3456" stroke-width="2"/>
  <!-- Red Light -->
  <circle cx="32" cy="18" r="8" fill="#ff1744" filter="url(#glow)" opacity="0.9"/>
  <!-- Amber Light -->
  <circle cx="32" cy="34" r="8" fill="#ffb700" filter="url(#glow)" opacity="0.9"/>
  <!-- Green Light -->
  <circle cx="32" cy="50" r="8" fill="#00e676" filter="url(#glow)" opacity="0.9"/>
  <!-- Inner glow dots -->
  <circle cx="30" cy="16" r="2" fill="white" opacity="0.3"/>
  <circle cx="30" cy="32" r="2" fill="white" opacity="0.3"/>
  <circle cx="30" cy="48" r="2" fill="white" opacity="0.3"/>
</svg>